<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="void — one inbox for everything">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.6" stop-color="#0e1428"/>
      <stop offset="1" stop-color="#131a33"/>
    </linearGradient>
    <radialGradient id="voidGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#7c5cff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- scattered stars -->
  <g fill="#cdd6ff">
    <circle cx="480" cy="42" r="1.4" opacity="0.35"/>
    <circle cx="540" cy="262" r="1.1" opacity="0.25"/>
    <circle cx="950" cy="28" r="1.3" opacity="0.3"/>
    <circle cx="660" cy="22" r="1.0" opacity="0.25"/>
    <circle cx="905" cy="270" r="1.5" opacity="0.3"/>
    <circle cx="415" cy="150" r="1.2" opacity="0.2"/>
    <circle cx="1010" cy="150" r="1.0" opacity="0.25"/>
    <circle cx="585" cy="120" r="0.9" opacity="0.2"/>
  </g>

  <!-- ===== left: wordmark ===== -->
  <!-- app icon -->
  <g>
    <rect x="78" y="96" width="74" height="74" rx="18" fill="#11182f" stroke="#2b3658" stroke-width="1.5"/>
    <rect x="78" y="96" width="74" height="74" rx="18" fill="url(#voidGlow)"/>
    <text x="96" y="144" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="26" font-weight="700" fill="#a78bfa">&#10095;</text>
    <text x="118" y="144" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="26" font-weight="700" fill="#e2e8f0">_</text>
  </g>
  <text x="172" y="152" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#f1f5f9" letter-spacing="-1">void</text>
  <text x="174" y="192" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#94a3b8">One inbox for everything.</text>

  <!-- ===== middle-right: terminal window with the void glow ===== -->
  <ellipse cx="710" cy="150" rx="240" ry="150" fill="url(#voidGlow)"/>
  <g>
    <rect x="560" y="58" width="300" height="184" rx="12" fill="#0d1426" fill-opacity="0.92" stroke="#2a3655" stroke-width="1.5"/>
    <!-- title bar -->
    <line x1="560" y1="90" x2="860" y2="90" stroke="#222d4a" stroke-width="1"/>
    <circle cx="582" cy="74" r="5" fill="#ff5f56"/>
    <circle cx="600" cy="74" r="5" fill="#ffbd2e"/>
    <circle cx="618" cy="74" r="5" fill="#27c93f"/>
    <!-- prompt -->
    <text x="580" y="122" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" font-weight="600">
      <tspan fill="#a78bfa">&#10095;</tspan><tspan fill="#e2e8f0" dx="8">void inbox</tspan>
    </text>
    <!-- result rows (abstract) -->
    <g>
      <rect x="580" y="138" width="36" height="10" rx="5" fill="#25d366" fill-opacity="0.55"/>
      <rect x="624" y="138" width="180" height="10" rx="5" fill="#3b4868"/>
      <rect x="580" y="158" width="36" height="10" rx="5" fill="#2aabee" fill-opacity="0.55"/>
      <rect x="624" y="158" width="150" height="10" rx="5" fill="#374361"/>
      <rect x="580" y="178" width="36" height="10" rx="5" fill="#ea4335" fill-opacity="0.55"/>
      <rect x="624" y="178" width="196" height="10" rx="5" fill="#323d59"/>
      <rect x="580" y="198" width="36" height="10" rx="5" fill="#e01e5a" fill-opacity="0.55"/>
      <rect x="624" y="198" width="120" height="10" rx="5" fill="#2d3751"/>
      <rect x="580" y="218" width="10" height="12" rx="2" fill="#a78bfa">
        <animate attributeName="opacity" values="1;0;1" dur="1.6s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- ===== lines: services converge into the terminal ===== -->
  <g fill="none" stroke-width="2" filter="url(#glow)">
    <path d="M1048 52  C 980 52, 940 96, 862 102" stroke="#2aabee"/>
    <path d="M1078 101 C 1000 104, 960 124, 862 126" stroke="#25d366"/>
    <path d="M1093 150 C 1010 150, 950 150, 862 150" stroke="#ea4335"/>
    <path d="M1078 199 C 1000 196, 960 176, 862 174" stroke="#e01e5a"/>
    <path d="M1048 248 C 980 248, 940 204, 862 198" stroke="#ff6600"/>
  </g>
  <!-- endpoint dots -->
  <g filter="url(#glow)">
    <circle cx="862" cy="102" r="3.5" fill="#2aabee"/>
    <circle cx="862" cy="126" r="3.5" fill="#25d366"/>
    <circle cx="862" cy="150" r="3.5" fill="#ea4335"/>
    <circle cx="862" cy="174" r="3.5" fill="#e01e5a"/>
    <circle cx="862" cy="198" r="3.5" fill="#ff6600"/>
  </g>

  <!-- ===== right: service tiles (top to bottom: Telegram, WhatsApp, Gmail, Slack, Hacker News) ===== -->
  <!-- Telegram -->
  <g filter="url(#softGlow)">
    <rect x="1048" y="26" width="52" height="52" rx="13" fill="#2aabee" fill-opacity="0.10" stroke="#2aabee" stroke-width="1.5"/>
    <path d="M1063 52 l22 -9 -6 18 -5 -5 -4 4 -1 -6 z M1079 61 l-5 -5 10 -10" fill="none" stroke="#7fd0f7" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <!-- WhatsApp -->
  <g filter="url(#softGlow)">
    <rect x="1078" y="75" width="52" height="52" rx="13" fill="#25d366" fill-opacity="0.10" stroke="#25d366" stroke-width="1.5"/>
    <path d="M1115 113 a12 12 0 1 0 -10 5 l7 2 z" fill="none" stroke="#7fe3a8" stroke-width="2" stroke-linejoin="round"/>
  </g>
  <!-- Gmail -->
  <g filter="url(#softGlow)">
    <rect x="1093" y="124" width="52" height="52" rx="13" fill="#ea4335" fill-opacity="0.10" stroke="#ea4335" stroke-width="1.5"/>
    <rect x="1106" y="141" width="26" height="18" rx="3" fill="none" stroke="#f49a92" stroke-width="2"/>
    <path d="M1106 143 l13 9 13 -9" fill="none" stroke="#f49a92" stroke-width="2" stroke-linejoin="round"/>
  </g>
  <!-- Slack -->
  <g filter="url(#softGlow)">
    <rect x="1078" y="173" width="52" height="52" rx="13" fill="#e01e5a" fill-opacity="0.10" stroke="#e01e5a" stroke-width="1.5"/>
    <g stroke="#f298b4" stroke-width="2" stroke-linecap="round">
      <line x1="1098" y1="191" x2="1095" y2="207"/>
      <line x1="1113" y1="191" x2="1110" y2="207"/>
      <line x1="1095" y1="195" x2="1115" y2="195"/>
      <line x1="1093" y1="203" x2="1113" y2="203"/>
    </g>
  </g>
  <!-- Hacker News -->
  <g filter="url(#softGlow)">
    <rect x="1048" y="222" width="52" height="52" rx="13" fill="#ff6600" fill-opacity="0.10" stroke="#ff6600" stroke-width="1.5"/>
    <path d="M1066 238 l8 12 8 -12 M1074 250 v10" fill="none" stroke="#ffb380" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- faint extra tiles hinting "and more" (Calendar, LinkedIn) -->
  <g opacity="0.45">
    <rect x="1140" y="50" width="40" height="40" rx="11" fill="#4285f4" fill-opacity="0.08" stroke="#4285f4" stroke-width="1.2"/>
    <rect x="1150" y="62" width="20" height="17" rx="2" fill="none" stroke="#9bbcf7" stroke-width="1.6"/>
    <line x1="1150" y1="67" x2="1170" y2="67" stroke="#9bbcf7" stroke-width="1.6"/>
    <rect x="1140" y="210" width="40" height="40" rx="11" fill="#0a66c2" fill-opacity="0.08" stroke="#0a66c2" stroke-width="1.2"/>
    <text x="1151" y="237" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="17" font-weight="700" fill="#7fb3e3">in</text>
  </g>
</svg>
